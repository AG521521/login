<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录系统 - agai.online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 380px;
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 28px;
    }
    .input-group { margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    #message { margin-top: 15px; text-align: center; min-height: 24px; color: #e74c3c; }
    #message.success { color: #27ae60; }
    .info { margin-top: 20px; text-align: center; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 登录系统</h2>
    <div class="input-group">
      <input type="text" id="username" placeholder="用户名" autocomplete="off" value="admin">
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="密码" value="mypassword123">
    </div>
    <button id="loginBtn" onclick="login()">登 录</button>
    <div id="message"></div>
    <div class="info">测试账号: admin / mypassword123</div>
  </div>

  <script>
    // ✅ 确认这里是你的后端地址
    const API_URL = "https://login-production-f825.up.railway.app";
    
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const msg = document.getElementById("message");
      
      if (!username || !password) {
        msg.textContent = "❌ 请输入用户名和密码";
        msg.className = "";
        return;
      }
      
      btn.disabled = true;
      btn.textContent = "登录中...";
      msg.textContent = "正在连接服务器...";
      msg.className = "";
      
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
if (response.ok && data.success) {
  msg.textContent = "✅ 登录成功！正在跳转...";
  msg.className = "success";
  localStorage.setItem("token", data.token);
  localStorage.setItem("user", JSON.stringify(data.user));
  
  // 跳转到控制面板
  setTimeout(() => {
    window.location.href = '/dashboard';
  }, 500);
} else {
          msg.textContent = "❌ " + (data.message || "用户名或密码错误");
          msg.className = "";
        }
      } catch (error) {
        console.error("登录错误:", error);
        msg.textContent = "❌ 网络错误，请检查后端服务是否运行。";
        msg.className = "";
      } finally {
        btn.disabled = false;
        btn.textContent = "登 录";
      }
    }
    
    // 回车登录
    document.getElementById("password").addEventListener("keypress", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
